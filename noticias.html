<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0b0e;--bg2:#111115;--bg3:#18181f;--bg4:#222229;
  --gold:#f0c050;--gold2:#c9952e;--gold3:#8a6010;
  --text:#eeeae3;--text2:#9e9aaa;--text3:#5a5668;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --border-gold:rgba(240,192,80,0.28);
  --radius:8px;--radius-lg:12px;--tr:.18s ease;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;}
img{display:block;max-width:100%;}

/* HEADER */
#site-header{position:sticky;top:0;z-index:200;background:rgba(11,11,14,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.header-inner{display:flex;align-items:center;gap:16px;padding:0 32px;height:60px;}
.header-sep{width:1px;height:22px;background:var(--border2);flex-shrink:0;}
.header-tag{font-size:11px;color:var(--text3);font-style:italic;}
.header-tag em{font-style:normal;color:var(--gold2);}
.header-nav{display:flex;gap:2px;margin-left:auto;overflow-x:auto;}
.header-nav::-webkit-scrollbar{display:none;}
.nav-link{background:none;border:none;padding:7px 13px;font-size:12.5px;color:var(--text2);border-radius:6px;transition:var(--tr);white-space:nowrap;cursor:pointer;}
.nav-link:hover{color:var(--text);background:var(--bg3);}
.nav-link.active{color:var(--gold);background:rgba(240,192,80,0.08);}
.user-avatar{width:34px;height:34px;border-radius:50%;background:#2a251a;border:2px solid var(--gold3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--gold2);flex-shrink:0;overflow:hidden;position:relative;margin-left:12px;cursor:pointer;}
.user-avatar img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}

/* PAGE HEADER */
.page-header{background:linear-gradient(135deg,#0f0f12,#1a1610);border-bottom:1px solid rgba(240,192,80,0.1);padding:36px 32px 28px;}
.page-header-inner{max-width:1100px;margin:0 auto;}
.page-label{font-size:10.5px;letter-spacing:.12em;color:var(--gold2);text-transform:uppercase;font-weight:500;margin-bottom:8px;}
.page-title{font-family:'Fraunces',serif;font-size:36px;color:var(--text);letter-spacing:-.4px;margin-bottom:8px;}
.page-title em{font-style:italic;color:var(--gold);}
.page-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.page-meta-item{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.refresh-btn{background:none;border:1px solid var(--border2);color:var(--text2);padding:7px 16px;border-radius:var(--radius);font-size:12px;transition:var(--tr);display:flex;align-items:center;gap:6px;}
.refresh-btn:hover{color:var(--text);border-color:var(--gold2);}
.refresh-btn.loading{opacity:.6;pointer-events:none;}
.last-updated{font-size:11px;color:var(--text3);}

/* SECTIONS NAV */
.sections-nav{border-bottom:1px solid var(--border);padding:0 32px;background:rgba(11,11,14,0.97);overflow-x:auto;display:flex;}
.sections-nav::-webkit-scrollbar{display:none;}
.section-tab{background:none;border:none;border-bottom:2px solid transparent;padding:11px 16px;font-size:12.5px;color:var(--text3);white-space:nowrap;transition:var(--tr);display:flex;align-items:center;gap:6px;}
.section-tab:hover{color:var(--text);}
.section-tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.section-count{background:var(--bg3);color:var(--text3);font-size:10px;padding:1px 6px;border-radius:10px;}
.section-tab.on .section-count{background:rgba(240,192,80,0.1);color:var(--gold2);}

/* MAIN LAYOUT */
.news-layout{max-width:1100px;margin:0 auto;padding:32px;}

/* ACCESS WALL */
.access-wall{
  background:var(--bg2);border:1px solid var(--border-gold);
  border-radius:var(--radius-lg);padding:56px 48px;
  text-align:center;margin:32px;
}
.access-wall h2{font-family:'Fraunces',serif;font-size:28px;color:var(--text);margin-bottom:10px;}
.access-wall h2 em{font-style:italic;color:var(--gold);}
.access-wall p{font-size:14px;color:var(--text2);max-width:440px;margin:0 auto 28px;line-height:1.7;}
.btn-access{background:var(--gold2);color:#0b0b0e;border:none;padding:12px 28px;border-radius:var(--radius);font-size:14px;font-weight:600;transition:var(--tr);cursor:pointer;font-family:inherit;}
.btn-access:hover{background:var(--gold);}

/* FEATURED */
.featured-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:14px;overflow:hidden;margin-bottom:28px;
  display:grid;grid-template-columns:1fr 1fr;
  cursor:pointer;transition:var(--tr);
}
.featured-card:hover{border-color:rgba(240,192,80,0.3);}
.featured-img{
  height:280px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:64px;position:relative;overflow:hidden;
}
.featured-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.featured-img-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(11,11,14,0.3),transparent);}
.featured-section-badge{
  position:absolute;top:12px;left:12px;
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border-radius:4px;
}
.featured-body{padding:28px;display:flex;flex-direction:column;justify-content:center;}
.featured-label{font-size:10px;color:var(--gold2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:600;}
.featured-title{font-family:'Fraunces',serif;font-size:22px;color:var(--text);line-height:1.3;margin-bottom:10px;letter-spacing:-.2px;}
.featured-summary{font-size:13.5px;color:var(--text2);line-height:1.75;margin-bottom:16px;}
.featured-footer{display:flex;align-items:center;gap:10px;}
.featured-source{font-size:11.5px;color:var(--text3);}
.featured-read{font-size:12px;color:var(--gold2);font-weight:500;margin-left:auto;}

/* ACADEMIA SECTION */
.academia-section{margin-bottom:36px;}
.academia-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.academia-label{font-size:10.5px;letter-spacing:.12em;color:var(--gold2);text-transform:uppercase;font-weight:600;}
.academia-divider{flex:1;height:1px;background:var(--border-gold);}
.academia-write-btn{background:var(--gold2);color:#0b0b0e;border:none;padding:7px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;transition:var(--tr);}
.academia-write-btn:hover{background:var(--gold);}
.academia-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

/* NEWS SECTION */
.news-section{margin-bottom:36px;}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.section-title-bar{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.section-divider{flex:1;height:1px;background:var(--border);}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

/* NEWS CARD */
.news-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  cursor:pointer;transition:transform .2s,border-color .18s,box-shadow .2s;
  display:flex;flex-direction:column;
}
.news-card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 10px 30px rgba(0,0,0,.5);}
.news-thumb{
  height:130px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;position:relative;overflow:hidden;flex-shrink:0;
}
.news-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.news-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(11,11,14,.6),transparent);}
.news-section-badge{
  position:absolute;bottom:8px;left:8px;
  font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:3px;
}
.news-source-badge{
  position:absolute;top:8px;right:8px;
  background:rgba(11,11,14,.85);border:1px solid var(--border2);
  border-radius:3px;padding:2px 7px;font-size:9.5px;color:var(--text3);
}
.news-body{padding:12px 14px 14px;flex:1;display:flex;flex-direction:column;}
.news-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.news-summary{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.news-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.news-date{font-size:10.5px;color:var(--text3);}
.news-read-more{font-size:11px;color:var(--gold2);font-weight:500;}

/* ACADEMIA CARD (noticias propias) */
.academia-card{
  background:linear-gradient(135deg,rgba(26,18,8,0.9),rgba(32,24,10,0.9));
  border:1px solid rgba(240,192,80,0.18);
  border-radius:var(--radius-lg);overflow:hidden;
  cursor:pointer;transition:var(--tr);
}
.academia-card:hover{border-color:rgba(240,192,80,0.35);transform:translateY(-2px);}
.academia-thumb{height:110px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden;}
.academia-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.academia-body{padding:12px 14px 14px;}
.academia-badge{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:var(--gold2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.academia-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.academia-summary{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.academia-date{font-size:10.5px;color:var(--text3);margin-top:8px;}

/* LOADING */
.loading-state{text-align:center;padding:60px 20px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--text3);}
.loading-sub{font-size:11.5px;color:var(--text3);margin-top:4px;opacity:.7;}

/* SKELETON */
.skeleton{background:var(--bg3);border-radius:var(--radius);animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%,100%{opacity:.4;}50%{opacity:.8;}}
.skel-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}

/* ERROR */
.error-state{text-align:center;padding:48px 20px;}
.error-icon{font-size:40px;margin-bottom:12px;}
.error-text{font-size:14px;color:var(--text2);margin-bottom:6px;}
.error-sub{font-size:12px;color:var(--text3);}

/* SECTION COLORS */
.sec-academia{background:rgba(240,192,80,0.15);color:var(--gold);}
.sec-hollywood{background:rgba(59,130,246,0.15);color:#7db5f7;}
.sec-latinoamerica{background:rgba(34,197,94,0.15);color:#6ee7a0;}
.sec-autor{background:rgba(168,85,247,0.15);color:#c084fc;}
.sec-europeo{background:rgba(99,102,241,0.15);color:#a5b4fc;}
.sec-asiatico{background:rgba(239,68,68,0.15);color:#fca5a5;}
.sec-africano{background:rgba(249,115,22,0.15);color:#fdba74;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--text);transform:translateY(60px);opacity:0;transition:all .3s ease;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:900px){
  .featured-card{grid-template-columns:1fr;}
  .featured-img{height:200px;}
  .news-grid{grid-template-columns:repeat(2,1fr);}
  .academia-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .header-inner{padding:0 16px;} .header-nav{display:none;}
  .page-header{padding:24px 16px 20px;} .page-title{font-size:26px;}
  .sections-nav{padding:0 16px;}
  .news-layout{padding:20px 16px;}
  .news-grid{grid-template-columns:1fr;}
}
</style>
</head>

async function init(){
  initAvatar();
  if(!session)return;
  await Promise.all([loadAcademiaNews(), loadNews(false)]);
}

/* ── NOTICIAS DE LA ACADEMIA (Supabase) ── */
async function loadAcademiaNews(){
  try{
    const data=await supaGet('noticias','select=*&publicada=eq.true&categoria=neq.Editorial&order=fecha_pub.desc&limit=6');
    academiaNews=(data||[]).map(n=>{
      const urlFuente=n.url_fuente||'';
      return {
        titleEs: n.titulo,
        summaryEs: n.cuerpo||'',
        section: 'academia',
        source: 'Academia Otto Salamanca',
        sourceUrl: urlFuente,
        pubDate: n.fecha_pub,
        imageUrl: '',
        emoji: n.emoji||'⭐',
        isAcademia: true
      };
    });
  }catch(e){console.warn('Academia news:', e.message);}
}

/* ── NOTICIAS EXTERNAS (API) ── */
async function loadNews(forceRefresh=false){
  if(!session)return;
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.innerHTML='⟳ Actualizando...';

  // Check cache
  if(!forceRefresh){
    const cached=localStorage.getItem(CACHE_KEY);
    const cachedTime=parseInt(localStorage.getItem(CACHE_TIME)||'0');
    if(cached && Date.now()-cachedTime < CACHE_TTL){
      allArticles=JSON.parse(cached);
      renderAll();
      btn.classList.remove('loading');
      btn.innerHTML='↺ Actualizar';
      const mins=Math.round((Date.now()-cachedTime)/60000);
      document.getElementById('last-updated').textContent=`Actualizado hace ${mins} min`;
      return;
    }
  }

  showLoading();

  try{
    const res=await fetch(NEWS_API,{signal:AbortSignal.timeout(30000)});
    if(!res.ok)throw new Error('API error '+res.status);
    const data=await res.json();
    allArticles=data.articles||[];
    localStorage.setItem(CACHE_KEY,JSON.stringify(allArticles));
    localStorage.setItem(CACHE_TIME,Date.now().toString());
    document.getElementById('last-updated').textContent='Actualizado ahora';
    renderAll();
  }catch(e){
    console.error('News error:',e);
    // Try cache as fallback
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      allArticles=JSON.parse(cached);
      renderAll();
      toast('Mostrando noticias en caché');
    }else{
      showError();
    }
  }finally{
    btn.classList.remove('loading');
    btn.innerHTML='↺ Actualizar';
  }
}

/* ── RENDER ── */
function renderAll(){
  const combined=[...academiaNews,...allArticles];
  updateCounts(combined);
  renderContent(combined, activeSection);
}

function updateCounts(articles){
  const sections=['all','academia','hollywood','latinoamerica','autor','europeo','asiatico','africano'];
  sections.forEach(s=>{
    const count=s==='all'?articles.length:articles.filter(a=>a.section===s).length;
    const el=document.getElementById('cnt-'+s);
    if(el)el.textContent=count||'0';
  });
}

function filterSection(section, btn){
  activeSection=section;
  document.querySelectorAll('.section-tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  const combined=[...academiaNews,...allArticles];
  renderContent(combined, section);
}

function renderContent(articles, section){
  const filtered=section==='all'?articles:articles.filter(a=>a.section===section);
  const academia=filtered.filter(a=>a.isAcademia);
  const external=filtered.filter(a=>!a.isAcademia);
  const featured=external.find(a=>a.featured);
  const rest=external.filter(a=>!a.featured);

  if(!filtered.length){
    document.getElementById('main-content').innerHTML=`
      <div class="news-layout">
        <div class="error-state">
          <div class="error-icon">📭</div>
          <div class="error-text">No hay noticias en esta sección aún</div>
          <div class="error-sub">Prueba otra categoría o actualiza más tarde</div>
        </div>
      </div>`;
    return;
  }

  // Build sections HTML
  const sections=[
    {key:'hollywood',articles:rest.filter(a=>a.section==='hollywood')},
    {key:'latinoamerica',articles:rest.filter(a=>a.section==='latinoamerica')},
    {key:'autor',articles:rest.filter(a=>a.section==='autor')},
    {key:'europeo',articles:rest.filter(a=>a.section==='europeo')},
    {key:'asiatico',articles:rest.filter(a=>a.section==='asiatico')},
    {key:'africano',articles:rest.filter(a=>a.section==='africano')},
  ].filter(s=>section==='all'?s.articles.length>0:s.key===section&&s.articles.length>0);

  let html='<div class="news-layout">';

  // Noticias de la Academia (siempre primero si hay)
  if(academia.length && (section==='all'||section==='academia')){
    html+=`<div class="academia-section">
      <div class="academia-header">
        <div class="academia-label">⭐ Noticias de la Academia</div>
        <div class="academia-divider"></div>
      </div>
      <div class="academia-grid">
        ${academia.map(a=>buildAcademiaCard(a)).join('')}
      </div>
    </div>`;
  }

  // Featured
  if(featured&&(section==='all'||section===featured.section)){
    html+=buildFeaturedCard(featured);
  }

  // Sections
  sections.forEach(s=>{
    if(!s.articles.length)return;
    const info=SECTION_LABELS[s.key]||{emoji:'🎬',label:s.key,color:'sec-hollywood'};
    html+=`<div class="news-section">
      <div class="section-header">
        <div class="section-title-bar">${info.emoji} ${info.label}</div>
        <div class="section-divider"></div>
      </div>
      <div class="news-grid">
        ${s.articles.slice(0,6).map(a=>buildNewsCard(a)).join('')}
      </div>
    </div>`;
  });

  html+='</div>';
  document.getElementById('main-content').innerHTML=html;
}

function buildFeaturedCard(a){
  const info=SECTION_LABELS[a.section]||{emoji:'🎬',label:'',color:'sec-hollywood'};
  const date=a.pubDate?formatDate(a.pubDate):'';
  return `<div class="featured-card" onclick="openArticle('${encodeURIComponent(a.sourceUrl)}')">
    <div class="featured-img">
      ${a.imageUrl?`<img src="${a.imageUrl}" alt="${a.titleEs}" loading="lazy">`:'<span style="font-size:64px;">🎬</span>'}
      <div class="featured-img-overlay"></div>
      <div class="featured-section-badge ${info.color}">${info.emoji} ${info.label}</div>
    </div>
    <div class="featured-body">
      <div class="featured-label">Destacada</div>
      <div class="featured-title">${a.titleEs}</div>
      <div class="featured-summary">${a.summaryEs}</div>
      <div class="featured-footer">
        <div class="featured-source">${a.source} · ${date}</div>
        <div class="featured-read">Leer en ${a.source} →</div>
      </div>
    </div>
  </div>`;
}

function buildNewsCard(a){
  const info=SECTION_LABELS[a.section]||{emoji:'🎬',label:'',color:'sec-hollywood'};
  const date=a.pubDate?formatDate(a.pubDate):'';
  return `<div class="news-card" onclick="openArticle('${encodeURIComponent(a.sourceUrl)}')">
    <div class="news-thumb">
      ${a.imageUrl?`<img src="${a.imageUrl}" alt="${a.titleEs}" loading="lazy">`:'<span>🎬</span>'}
      <div class="news-thumb-overlay"></div>
      <div class="news-section-badge ${info.color}">${info.emoji} ${info.label}</div>
      <div class="news-source-badge">${a.source}</div>
    </div>
    <div class="news-body">
      <div class="news-title">${a.titleEs}</div>
      <div class="news-summary">${a.summaryEs}</div>
      <div class="news-footer">
        <div class="news-date">${date}</div>
        <div class="news-read-more">Leer más →</div>
      </div>
    </div>
  </div>`;
}

function buildAcademiaCard(a){
  const date=a.pubDate?formatDate(a.pubDate):'';
  const hasUrl=a.sourceUrl&&a.sourceUrl.startsWith('http');
  return `<div class="academia-card" onclick="${hasUrl?`openArticle('${encodeURIComponent(a.sourceUrl)}')`:'void(0)'}">
    <div class="academia-thumb">
      ${a.imageUrl?`<img src="${a.imageUrl}" alt="${a.titleEs}">`:`<span>${a.emoji||'⭐'}</span>`}
    </div>
    <div class="academia-body">
      <div class="academia-badge">⭐ Academia Otto Salamanca</div>
      <div class="academia-title">${a.titleEs}</div>
      <div class="academia-summary">${a.summaryEs}</div>
      <div class="academia-date">${date}</div>
    </div>
  </div>`;
}

function openArticle(encodedUrl){
  const url=decodeURIComponent(encodedUrl);
  if(url&&url.startsWith('http'))window.open(url,'_blank');
}

/* ── LOADING / ERROR ── */
function showLoading(){
  document.getElementById('main-content').innerHTML=`
    <div class="news-layout">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Buscando noticias de las últimas 72 horas...</div>
        <div class="loading-sub">Variety · IndieWire · Screen Daily · Cineuropa · MUBI</div>
      </div>
    </div>`;
}

function showError(){
  document.getElementById('main-content').innerHTML=`
    <div class="news-layout">
      <div class="error-state">
        <div class="error-icon">📡</div>
        <div class="error-text">No se pudieron cargar las noticias</div>
        <div class="error-sub">Verifica tu conexión e intenta de nuevo</div>
        <button onclick="loadNews(true)" style="margin-top:16px;background:var(--gold2);color:#0b0b0e;border:none;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Reintentar</button>
      </div>
    </div>`;
}

/* ── UTILS ── */
function formatDate(dateStr){
  if(!dateStr)return'';
  try{
    const d=new Date(dateStr);
    const diff=Date.now()-d.getTime();
    const hrs=Math.floor(diff/3600000);
    const days=Math.floor(hrs/24);
    if(hrs<1)return'ahora mismo';
    if(hrs<24)return`hace ${hrs}h`;
    if(days<7)return`hace ${days} día${days>1?'s':''}`;
    return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  }catch(e){return'';}
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';
  setTimeout(()=>t.className='toast',2600);
}

init();
</script>

@keyframes loader-pulse{0%,100%{opacity:.7;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
body{opacity:0;transition:opacity .3s ease,transform .3s ease;}
body.aos-loaded{opacity:1;}
</style>
<script>
(function(){
  var loader=document.getElementById('page-loader');
  var bar=document.getElementById('loader-bar');
  var w=0;
  var iv=setInterval(function(){w=Math.min(w+(Math.random()*18),88);bar.style.width=w+'%';},70);
  window.addEventListener('load',function(){
    clearInterval(iv);bar.style.width='100%';
    setTimeout(function(){
      loader.style.opacity='0';
      document.body.classList.add('aos-loaded');
      setTimeout(function(){if(loader.parentNode)loader.parentNode.removeChild(loader);},420);
    },180);
  });
})();
function navigateTo(url){
  document.body.style.opacity='0';
  document.body.style.transform='translateY(-5px)';
  document.body.style.transition='opacity .18s ease,transform .18s ease';
  setTimeout(function(){window.location.href=url;},190);
}
</script>
