<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espacio Cinéfilo · Academia Otto Salamanca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0b0b0e;--bg2:#131317;--bg3:#1a1a20;--bg4:#222228;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--text:#eeeae3;--text2:#8e8a96;--text3:#4e4a58;--gold:#c9952e;--gold2:#f0c050;--green:#4caf82;--red:#d95f5f;--purple:#9b7fd4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}input,textarea,select{font-family:inherit;}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(201,149,46,.08) 0%,transparent 60%);}
.auth-card{width:100%;max-width:400px;}
.auth-logo{font-family:'Fraunces',serif;font-size:32px;text-align:center;margin-bottom:4px;}
.auth-logo em{font-style:italic;color:var(--gold2);}
.auth-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:32px;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
.auth-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:10px;font-size:13px;color:var(--text3);transition:.15s;}
.auth-tab.on{color:var(--text);border-bottom-color:var(--gold2);font-weight:500;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:5px;}
.auth-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:10px 12px;outline:none;transition:.15s;}
.auth-field input:focus{border-color:rgba(240,192,80,.4);}
.auth-btn{width:100%;background:var(--gold2);color:#0b0b0e;border:none;border-radius:7px;padding:11px;font-size:13px;font-weight:600;margin-top:4px;}
.auth-btn:hover{background:#fff;}
.auth-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(11,11,14,.97);backdrop-filter:blur(20px);}
.header-top{display:flex;align-items:center;gap:14px;padding:0 24px;height:56px;border-bottom:1px solid var(--border);}
.logo{font-family:'Fraunces',serif;font-size:19px;letter-spacing:-.2px;white-space:nowrap;flex-shrink:0;}
.logo em{font-style:italic;color:var(--gold2);}
.logo-rule{width:1px;height:22px;background:var(--border2);flex-shrink:0;}
.header-user{font-size:11px;color:var(--text3);flex-shrink:0;}
.header-user span{color:var(--gold);}
.search-wrap{flex:1;max-width:240px;position:relative;margin-left:auto;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
#search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 32px;color:var(--text);font-size:12px;outline:none;transition:.15s;}
#search:focus{border-color:rgba(240,192,80,.4);}
#search::placeholder{color:var(--text3);}
.add-btn{background:var(--gold2);color:#0b0b0e;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.add-btn:hover{background:#fff;}
.logout-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--text3);flex-shrink:0;}
.logout-btn:hover{color:var(--red);border-color:var(--red);}
.header-nav{display:flex;padding:0 24px;overflow-x:auto;border-bottom:1px solid var(--border);}
.header-nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;padding:9px 13px;font-size:11.5px;color:var(--text3);transition:.15s;white-space:nowrap;}
.nav-btn:hover{color:var(--text);}
.nav-btn.on{color:var(--text);border-bottom-color:var(--gold2);font-weight:500;}

/* VIEWS */
.view{display:none;}.view.on{display:block;}

/* FILMS */
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
select.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px 10px;outline:none;}
.films-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:11px;padding:16px 20px;}
.film-card{position:relative;cursor:pointer;transition:.18s;border-radius:6px;overflow:hidden;background:var(--bg2);}
.film-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.film-card .poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg3);}
.film-card .noimg{width:100%;aspect-ratio:2/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);text-align:center;padding:8px;line-height:1.4;}
.film-card .rbadge{position:absolute;bottom:36px;right:6px;background:rgba(11,11,14,.9);border-radius:4px;padding:2px 6px;font-size:11px;font-family:'Fraunces',serif;color:var(--gold2);}
.film-card .info{padding:6px 8px;}
.film-card .title{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.film-card .year{font-size:10px;color:var(--text3);}
.empty-state{text-align:center;padding:80px 20px;color:var(--text3);}
.empty-state .icon{font-size:48px;margin-bottom:16px;}
.empty-state h3{font-family:'Fraunces',serif;font-size:20px;color:var(--text);margin-bottom:8px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.on{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;}
.modal::-webkit-scrollbar{width:4px;}.modal::-webkit-scrollbar-thumb{background:var(--bg4);}
.mclose{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text3);font-size:20px;z-index:10;}
.mpads{padding:24px;}
.mfield{margin-bottom:12px;}
.mfield label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:5px;}
.mfield input,.mfield select,.mfield textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:8px 10px;outline:none;transition:.15s;}
.mfield input:focus,.mfield textarea:focus{border-color:rgba(240,192,80,.4);}
.mfield textarea{min-height:80px;resize:vertical;}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.msave{background:var(--gold2);color:#0b0b0e;border:none;border-radius:7px;padding:10px 20px;font-size:13px;font-weight:600;width:100%;margin-top:8px;}
.stars{display:flex;gap:4px;margin-bottom:4px;}
.star{font-size:20px;cursor:pointer;color:var(--bg4);transition:.1s;}
.star.on{color:var(--gold2);}
.tmdb-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px;max-height:260px;overflow-y:auto;}
.tmdb-poster{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:5px;cursor:pointer;border:2px solid transparent;}
.tmdb-poster:hover{border-color:var(--gold2);}

/* STATS */
.stats-wrap{padding:24px;}
.stats-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:14px 16px;}
.kpi-val{font-size:28px;font-weight:400;font-family:'Fraunces',serif;color:var(--gold2);margin-bottom:3px;}
.kpi-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}

/* LOADING */
.app-loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--gold2);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:8px 16px;font-size:13px;color:var(--text);z-index:500;opacity:0;transition:.3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RANKING */
/* RANKING */
.rank-toolbar{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
.rank-view-btns{display:flex;gap:4px;margin-left:auto;}
.rvbtn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text2);transition:.15s;}
.rvbtn:hover{border-color:var(--border2);color:var(--text);}
.rvbtn.on{background:var(--bg4);border-color:var(--border2);color:var(--text);}
.rank-save-btn{background:var(--gold);color:#0b0b0e;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;transition:.15s;}
.rank-save-btn:hover{background:var(--gold2);}
.rank-container{padding:14px 20px;}
.score-group{margin-bottom:20px;}
.score-group-header{display:flex;align-items:center;gap:11px;padding:7px 0;}
.score-group-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:3px 10px;font-size:13px;font-weight:500;font-family:'Fraunces',serif;color:var(--gold2);flex-shrink:0;}
.score-group-badge.pers{color:var(--purple);border-color:rgba(155,127,212,.35);}
.score-group-line{flex:1;height:1px;background:var(--border);}
.score-group-count{font-size:11px;color:var(--text3);flex-shrink:0;}
.rank-list{display:flex;flex-direction:column;gap:3px;}
.rank-item{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;transition:.15s;user-select:none;}
.rank-item[draggable=true]{cursor:grab;}
.rank-item[draggable=true]:hover{border-color:var(--border2);}
.rank-item.dragging{opacity:.35;border-color:var(--gold);cursor:grabbing;}
.rank-item.drag-over{border-color:var(--gold2);background:rgba(240,192,80,.06);}
.rank-pos{font-size:13px;font-weight:500;color:var(--text3);min-width:26px;text-align:right;font-family:'Fraunces',serif;}
.rank-poster-sm{width:28px;height:42px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
.rank-noimg-sm{width:28px;height:42px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);flex-shrink:0;}
.rank-info{flex:1;min-width:0;}
.rank-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-meta{font-size:11px;color:var(--text3);}
.rank-handle{color:var(--text3);font-size:15px;flex-shrink:0;opacity:.35;}
.rank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:9px;}
.rank-card{border-radius:7px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);transition:.2s;position:relative;user-select:none;}
.rank-card[draggable=true]{cursor:grab;}
.rank-card[draggable=true]:hover{border-color:var(--border2);}
.rank-card.dragging{opacity:.35;border-color:var(--gold);}
.rank-card.drag-over{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(240,192,80,.25);}
.rank-card-pos{position:absolute;top:4px;left:4px;background:rgba(11,11,14,.88);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:500;font-family:'Fraunces',serif;color:var(--gold2);backdrop-filter:blur(4px);}
.rank-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.rank-card-noimg{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:9px;color:var(--text3);text-align:center;padding:6px;}
.rank-card-info{padding:5px 6px 6px;}
.rank-card-title{font-size:10px;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* TOP 100 */
/* TOP 100 */
.top100-wrap{padding:18px 20px;}
.top100-note{background:rgba(201,149,46,.07);border:1px solid rgba(201,149,46,.2);border-radius:7px;padding:10px 13px;font-size:12px;color:var(--text2);margin-bottom:14px;}
.top100-note strong{color:var(--gold2);}
.top100-view-btns{display:flex;gap:6px;margin-bottom:14px;}
.top100-list{}
.dir-rank-item{display:flex;align-items:center;gap:11px;padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;transition:.15s;}
.dir-rank-item:hover{border-color:var(--border2);}
.dir-rank-pos{font-size:14px;font-weight:500;font-family:'Fraunces',serif;color:var(--text3);min-width:30px;text-align:center;}
.dir-rank-pos.gold{color:var(--gold2);}
.dir-rank-pos.silver{color:#b0aec8;}
.dir-rank-pos.bronze{color:#c47a52;}
.dir-rank-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);}
.dir-rank-photo-placeholder{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);flex-shrink:0;}
.dir-rank-info{flex:1;min-width:0;}
.dir-rank-name{font-size:13px;font-weight:500;cursor:pointer;transition:.15s;}
.dir-rank-name:hover{color:var(--gold2);}
.dir-rank-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.dir-rank-scores{display:flex;gap:12px;text-align:center;flex-shrink:0;}
.dir-rank-score{display:flex;flex-direction:column;}
.dir-rank-score-val{font-size:15px;font-family:'Fraunces',serif;font-weight:500;color:var(--gold2);}
.dir-rank-score-val.pers{color:var(--purple);}
.dir-rank-score-lbl{font-size:10px;color:var(--text3);}
.penalty-badge{background:rgba(217,95,95,.12);border:1px solid rgba(217,95,95,.25);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--red);margin-left:5px;}
/* TOP 100 GRID */
.top100-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.dir-grid-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:.15s;cursor:pointer;position:relative;}
.dir-grid-card:hover{border-color:var(--border2);transform:translateY(-3px);}
.dir-grid-photo{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--bg3);}
.dir-grid-photo-ph{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text3);}
.dir-grid-pos{position:absolute;top:6px;left:6px;background:rgba(11,11,14,.85);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:500;font-family:'Fraunces',serif;color:var(--gold2);backdrop-filter:blur(4px);}
.dir-grid-info{padding:8px 10px 10px;}
.dir-grid-name{font-size:12px;font-weight:500;margin-bottom:3px;cursor:pointer;}
.dir-grid-name:hover{color:var(--gold2);}
.dir-grid-score{font-size:18px;font-family:'Fraunces',serif;color:var(--gold2);}
.dir-grid-meta{font-size:10px;color:var(--text3);margin-top:2px;}

/* FILMOG */
.filmog-wrap{padding:18px 20px;}
.filmog-search-row{display:flex;gap:7px;margin-bottom:16px;}
.filmog-search-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.filmog-search-row button{background:var(--gold);color:#0b0b0e;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:500;}
.filmog-section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.filmog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:12px;}
.filmog-card{position:relative;border-radius:6px;overflow:hidden;background:var(--bg3);}
.filmog-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.filmog-card-noimg{width:100%;aspect-ratio:2/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);text-align:center;padding:4px;}
.filmog-card-info{padding:5px 6px;}.filmog-card-title{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.filmog-card-year{font-size:9px;color:var(--text3);}
.filmog-rating-badge{position:absolute;top:4px;right:4px;background:rgba(11,11,14,.85);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--gold2);}
.filmog-seen-badge{position:absolute;top:4px;left:4px;background:rgba(76,175,130,.85);border-radius:3px;padding:1px 5px;font-size:9px;color:#fff;}
.filmog-add-btn{width:100%;background:var(--gold);color:#0b0b0e;border:none;padding:5px;font-size:10px;font-weight:500;cursor:pointer;}
.filmog-dir-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;}
.filmog-dir-name{font-family:'Fraunces',serif;font-size:18px;}.filmog-dir-stats{font-size:11px;color:var(--text3);margin-top:2px;}

/* FESTIVALS */
/* FESTIVALS */
.fest-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.fest-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:.15s;}
.fest-card:hover{border-color:var(--border2);}
.fest-card-top{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.fest-badge{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;border-radius:3px;padding:3px 8px;margin-bottom:10px;font-weight:500;}
.fest-badge.upcoming{background:rgba(240,192,80,.1);color:var(--gold2);border:1px solid rgba(240,192,80,.22);}
.fest-badge.live{background:rgba(76,175,130,.1);color:var(--green);border:1px solid rgba(76,175,130,.25);}
.fest-badge.past{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
.fest-card-name{font-family:'Fraunces',serif;font-size:21px;font-weight:400;letter-spacing:-.3px;margin-bottom:3px;}
.fest-card-dates{font-size:11.5px;color:var(--text2);margin-bottom:4px;}
.fest-card-location{font-size:11px;color:var(--text3);}
.fest-card-award{font-size:11px;color:var(--gold);margin-top:8px;font-style:italic;}
.fest-countdown{font-size:11px;color:var(--text2);margin-top:6px;}
.fest-countdown strong{color:var(--text);font-weight:500;}
.fest-card-body{padding:14px 20px;}
.fest-section-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--text3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.fest-winner-card{background:rgba(201,149,46,.07);border:1px solid rgba(201,149,46,.2);border-radius:7px;padding:11px 14px;margin-bottom:10px;}
.fest-winner-prize{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--gold);margin-bottom:3px;}
.fest-winner-film{font-size:14px;font-family:'Fraunces',serif;font-weight:400;}
.fest-winner-dir{font-size:11px;color:var(--text2);margin-top:2px;}
.fest-film-item{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.fest-film-item:last-child{border-bottom:none;}
.fest-film-title{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fest-film-dir{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;}

/* ── NOTICIAS ───────────────────────────────────────────────────────────────── */

.rank-view-btns{display:flex;gap:4px;}
.rvbtn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);}
.rvbtn.on{background:var(--bg4);color:var(--text);border-color:var(--border2);}

<body>

<!-- Loading -->
<div class="app-loading" id="app-loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--text3);">Cargando…</div>
</div>

<!-- Auth -->
<div class="auth-screen" id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">Espacio <em>Cinéfilo</em></div>
    <div class="auth-sub">Academia Otto Salamanca · Tu biblioteca personal de cine</div>
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="showTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="showTab('register')">Registrarse</button>
    </div>
    <div id="tab-login">
      <div class="auth-field"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-field"><label>Contraseña</label><input type="password" id="login-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="auth-btn" onclick="doLogin()">Entrar</button>
    </div>
    <div id="tab-register" style="display:none;">
      <div class="auth-field"><label>Nombre</label><input type="text" id="reg-name" placeholder="Tu nombre"></div>
      <div class="auth-field"><label>Email</label><input type="email" id="reg-email" placeholder="tu@email.com"></div>
      <div class="auth-field"><label>Contraseña</label><input type="password" id="reg-pwd" placeholder="Mínimo 6 caracteres"></div>
      <button class="auth-btn" onclick="doRegister()">Crear cuenta</button>
    </div>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- App -->
<div id="main-app" style="display:none;">
  <header>
    <div class="header-top">
      <div class="logo">Espacio <em>Cinéfilo</em></div>
      <div class="logo-rule"></div>
      <div class="header-user">Hola, <span id="user-name">—</span></div>
      <div class="search-wrap">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Buscar película…" oninput="renderFilms()">
      </div>
      <button class="add-btn" onclick="openForm(null)">+ Agregar</button>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
    <div class="header-nav">
      <button class="nav-btn on" onclick="switchView('films',this)">Películas</button>
      <button class="nav-btn" onclick="switchView('ranking',this)">Mi Ranking</button>
      <button class="nav-btn" onclick="switchView('rewatched',this)">Re-vistas</button>
      <button class="nav-btn" onclick="switchView('filmog',this)">Filmografías</button>
      <button class="nav-btn" onclick="switchView('top100',this)">Top Directores</button>
      <button class="nav-btn" onclick="switchView('festivals',this)">Festivales</button>
      <button class="nav-btn" onclick="switchView('stats',this)">Estadísticas</button>

  <div id="view-films" class="view on">
    <div class="toolbar">
      <select class="fsel" id="fc-sort" onchange="renderFilms()">
        <option value="rating-desc">Mayor nota</option>
        <option value="rating-asc">Menor nota</option>
        <option value="year-desc">Más recientes</option>
        <option value="year-asc">Más antiguas</option>
        <option value="title-asc">A→Z</option>
      </select>
      <select class="fsel" id="fc-country" onchange="renderFilms()"><option value="">Todos los países</option></select>
      <select class="fsel" id="fc-director" onchange="renderFilms()"><option value="">Todos los directores</option></select>
    </div>
    <div class="films-grid" id="films-grid"></div>
  </div>

  <div id="view-ranking" class="view"><div id="ranking-wrap" style="padding:16px 20px;"></div></div>
  <div id="view-rewatched" class="view"><div id="rewatched-wrap" style="padding:16px 20px;"></div></div>

  <div id="view-filmog" class="view">
    <div style="padding:18px 20px;">
      <div style="display:flex;margin-bottom:18px;border-bottom:1px solid var(--border);">
        <button id="filmog-tab-dir" onclick="switchFilmogTab('dir')" style="background:none;border:none;border-bottom:2px solid var(--gold2);padding:9px 18px;font-size:12px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;">Por Director</button>
        <button id="filmog-tab-movie" onclick="switchFilmogTab('movie')" style="background:none;border:none;border-bottom:2px solid transparent;padding:9px 18px;font-size:12px;color:var(--text3);font-family:inherit;cursor:pointer;">Buscar en TMDB</button>
      </div>
      <div id="filmog-dir-panel">
        <div class="filmog-search-row"><input type="text" id="filmog-input" placeholder="Nombre del director..." onkeydown="if(event.key===&quot;Enter&quot;)searchFilmog()"><button onclick="searchFilmog()">Buscar</button></div>
        <div id="filmog-results"></div>
      </div>
      <div id="filmog-movie-panel" style="display:none;">
        <div class="filmog-search-row"><input type="text" id="filmog-movie-input" placeholder="Título..." onkeydown="if(event.key===&quot;Enter&quot;)searchFilmogMovie()"><button onclick="searchFilmogMovie()">Buscar TMDB</button></div>
        <div id="filmog-movie-results"></div>
      </div>
    </div>
  </div>

  <div id="view-top100" class="view"><div class="top100-wrap" id="top100-wrap"></div></div>

  <div id="view-festivals" class="view">
    <div style="padding:32px 36px;">
      <div style="margin-bottom:28px;">
        <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:400;">Festivales de Cine</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">Oportunidades de industria · 2025–2026</div>
      </div>
      <div id="festivals-body"></div>
    </div>
  </div>

  <div id="view-stats" class="view">
    <div class="stats-wrap" id="stats-content"></div>
  </div>
</div>

<!-- Form Modal -->
<div class="overlay" id="ov-form" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <button class="mclose" onclick="closeForm()">×</button>
    <div class="mpads">
      <div style="font-family:'Fraunces',serif;font-size:20px;margin-bottom:18px;" id="form-title">Agregar película</div>
      <div class="mfield">
        <label>Buscar en TMDB</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="tmdb-search-input" placeholder="Título…" onkeydown="if(event.key==='Enter')searchTMDB()">
          <button onclick="searchTMDB()" style="background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--text2);white-space:nowrap;">Buscar</button>
        </div>
        <div id="tmdb-results" class="tmdb-results"></div>
      </div>
      <div class="mrow">
        <div class="mfield"><label>Título</label><input type="text" id="f-title"></div>
        <div class="mfield"><label>Año</label><input type="number" id="f-year" min="1888" max="2030"></div>
      </div>
      <div class="mrow">
        <div class="mfield"><label>Director</label><input type="text" id="f-director"></div>
        <div class="mfield"><label>País</label><input type="text" id="f-country"></div>
      </div>
      <div class="mfield">
        <label>Poster (URL TMDB)</label>
        <input type="text" id="f-poster" oninput="previewPoster()">
        <img id="poster-preview" style="width:80px;aspect-ratio:2/3;object-fit:cover;border-radius:5px;margin-top:8px;display:none;">
      </div>
      <div class="mfield">
        <label>Nota (1–10)</label>
        <div class="stars" id="stars-obj"></div>
        <div style="font-size:13px;color:var(--text3);" id="rating-display">Sin calificar</div>
      </div>
      <div class="mfield"><label>¿La has visto más de una vez?</label>
        <input type="number" id="f-rewatch" min="1" max="99" value="1" style="width:80px;">
      </div>
      <div class="mfield"><label>Comentario</label><textarea id="f-comment"></textarea></div>
      <button class="msave" onclick="saveFilm()">Guardar película</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="ov-detail" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detail-content"></div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://rxmvsthzitsckhmbbids.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4bXZzdGh6aXRzY2tobWJiaWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjIzMjYsImV4cCI6MjA5MzUzODMyNn0.bS93DgQJCY4-0EGLvquHAUTfgOViglnKCXWKARaBW38';
const TMDB_KEY = '9ead44dc2fd5da01ee3499ece3cd72fb';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let FILMS = [];
let currentUser = null;
let editingFilmId = null;
let selectedRating = null;
let top100ScoreMode = 'obj';
let top100ViewMode = 'list';
let statsAllDirs = [];
const dirPhotoCache = {};

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; await loadUserFilms(); showApp(); }
  else showAuth();
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') { currentUser = session.user; await loadUserFilms(); showApp(); }
    else if (event === 'SIGNED_OUT') { currentUser = null; FILMS = []; showAuth(); }
  });
}
function showApp() {
  document.getElementById('app-loading').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  const name = currentUser?.user_metadata?.display_name || currentUser?.email?.split('@')[0] || 'Cinéfilo';
  document.getElementById('user-name').textContent = name;
  renderFilms(); populateFilters();
}
function showAuth() {
  document.getElementById('app-loading').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-login').style.display = tab==='login'?'block':'none';
  document.getElementById('tab-register').style.display = tab==='register'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('on',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('auth-err').textContent = '';
}
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const err = document.getElementById('auth-err');
  err.textContent = '';
  if(!email||!pwd){err.textContent='Completá todos los campos';return;}
  const {error} = await sb.auth.signInWithPassword({email,password:pwd});
  if(error) err.textContent = error.message==='Invalid login credentials'?'Email o contraseña incorrectos':error.message;
}
async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pwd = document.getElementById('reg-pwd').value;
  const err = document.getElementById('auth-err');
  err.textContent = '';
  if(!name||!email||!pwd){err.textContent='Completá todos los campos';return;}
  if(pwd.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres';return;}
  const {error} = await sb.auth.signUp({email,password:pwd,options:{data:{display_name:name}}});
  if(error) err.textContent = error.message;
  else { err.style.color='var(--green)'; err.textContent='✓ Revisá tu email para confirmar la cuenta'; }
}
async function doLogout() { await sb.auth.signOut(); }

// ── FILMS DB ──────────────────────────────────────────────────────────────────
async function loadUserFilms() {
  const {data,error} = await sb.from('user_films').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
  if(error){console.error(error);return;}
  FILMS = (data||[]).map(row=>({...row.film_data, _dbId:row.id}));
}
async function saveFilmToDB(filmData) {
  const toStore = {...filmData};
  delete toStore._dbId;
  if(editingFilmId) {
    const {error} = await sb.from('user_films').update({film_data:toStore,updated_at:new Date().toISOString()}).eq('id',editingFilmId);
    if(error) throw error;
    return {...toStore, _dbId:editingFilmId};
  } else {
    const {data,error} = await sb.from('user_films').insert({user_id:currentUser.id,film_data:toStore}).select().single();
    if(error) throw error;
    return {...toStore, _dbId:data.id};
  }
}
async function deleteFilmFromDB(dbId) {
  const {error} = await sb.from('user_films').delete().eq('id',dbId);
  if(error) throw error;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderFilms() {
  const grid = document.getElementById('films-grid');
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  const sort = document.getElementById('fc-sort')?.value||'rating-desc';
  const country = document.getElementById('fc-country')?.value||'';
  const director = document.getElementById('fc-director')?.value||'';
  let films = [...FILMS];
  if(q) films=films.filter(f=>(f.title||'').toLowerCase().includes(q)||(f.director||'').toLowerCase().includes(q));
  if(country) films=films.filter(f=>f.country===country);
  if(director) films=films.filter(f=>f.director===director);
  films.sort((a,b)=>{
    if(sort==='rating-desc') return (b.rating||0)-(a.rating||0);
    if(sort==='rating-asc') return (a.rating||0)-(b.rating||0);
    if(sort==='year-desc') return (b.year||0)-(a.year||0);
    if(sort==='year-asc') return (a.year||0)-(b.year||0);
    return (a.title||'').localeCompare(b.title||'');
  });
  if(!films.length){
    grid.innerHTML = FILMS.length===0
      ? '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎬</div><h3>Tu biblioteca está vacía</h3><p>Empezá agregando tu primera película</p></div>'
      : '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><h3>Sin resultados</h3></div>';
    return;
  }
  grid.innerHTML = films.map(f => {
    const src = f.poster ? `https://image.tmdb.org/t/p/w185${f.poster}` : '';
    return `<div class="film-card" onclick="openDetail('${f._dbId}')">
      ${src?`<img class="poster" src="${src}" loading="lazy" onerror="this.outerHTML='<div class=noimg>${esc(f.title)}</div>'">`:`<div class="noimg">${esc(f.title||'')}</div>`}
      ${f.rating!=null?`<div class="rbadge">${f.rating}</div>`:''}
      <div class="info"><div class="title">${esc(f.title||'')}</div><div class="year">${f.year||''}</div></div>
    </div>`;
  }).join('');
}
function populateFilters() {
  const countries = [...new Set(FILMS.map(f=>f.country).filter(Boolean))].sort();
  const directors = [...new Set(FILMS.map(f=>f.director).filter(Boolean))].sort();
  const cc = document.getElementById('fc-country');
  const dc = document.getElementById('fc-director');
  if(cc) cc.innerHTML = '<option value="">Todos los países</option>'+countries.map(c=>`<option>${esc(c)}</option>`).join('');
  if(dc) dc.innerHTML = '<option value="">Todos los directores</option>'+directors.map(d=>`<option>${esc(d)}</option>`).join('');
}

// ── FORM ──────────────────────────────────────────────────────────────────────
function openForm(dbId) {
  editingFilmId = dbId;
  selectedRating = null;
  document.getElementById('form-title').textContent = dbId ? 'Editar película' : 'Agregar película';
  document.getElementById('tmdb-results').innerHTML = '';
  document.getElementById('tmdb-search-input').value = '';
  const f = dbId ? FILMS.find(f=>f._dbId===dbId) : null;
  document.getElementById('f-title').value = f?.title||'';
  document.getElementById('f-year').value = f?.year||'';
  document.getElementById('f-director').value = f?.director||'';
  document.getElementById('f-country').value = f?.country||'';
  document.getElementById('f-poster').value = f?.poster||'';
  document.getElementById('f-comment').value = f?.comment||'';
  document.getElementById('f-rewatch').value = f?.rewatchCount||1;
  selectedRating = f?.rating??null;
  renderStars(selectedRating);
  previewPoster();
  document.getElementById('ov-form').classList.add('on');
}
function closeForm(){document.getElementById('ov-form').classList.remove('on');}
function renderStars(val){
  const c=document.getElementById('stars-obj');
  const d=document.getElementById('rating-display');
  c.innerHTML='';
  for(let i=1;i<=10;i++){const s=document.createElement('span');s.className='star'+(val!=null&&i<=val?' on':'');s.textContent='★';s.onclick=()=>{selectedRating=i;renderStars(i);};c.appendChild(s);}
  d.textContent=val!=null?`${val}/10`:'Sin calificar';
}
function previewPoster(){
  const val=document.getElementById('f-poster').value.trim();
  const img=document.getElementById('poster-preview');
  if(val){const src=val.startsWith('http')?val:`https://image.tmdb.org/t/p/w185${val}`;img.src=src;img.style.display='block';img.onerror=()=>img.style.display='none';}
  else img.style.display='none';
}
async function searchTMDB(){
  const q=document.getElementById('tmdb-search-input').value.trim();
  if(!q)return;
  const res=document.getElementById('tmdb-results');
  res.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 0;">Buscando…</div>';
  try{
    const data=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=es`).then(r=>r.json());
    const movies=(data.results||[]).filter(m=>m.poster_path).slice(0,12);
    if(!movies.length){res.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 0;">Sin resultados</div>';return;}
    res.innerHTML=movies.map(m=>`<div onclick="selectTMDB(${m.id},'${esc(m.title).replace(/'/g,"\'")}',${m.release_date?m.release_date.split('-')[0]:0},'${m.poster_path}')"><img class="tmdb-poster" src="https://image.tmdb.org/t/p/w92${m.poster_path}" title="${esc(m.title)}"></div>`).join('');
  }catch(e){res.innerHTML='<div style="font-size:11px;color:var(--text3);">Error</div>';}
}
async function selectTMDB(id,title,year,posterPath){
  document.getElementById('f-title').value=title;
  document.getElementById('f-year').value=year||'';
  document.getElementById('f-poster').value=posterPath;
  previewPoster();
  document.getElementById('tmdb-results').innerHTML='';
  try{
    const data=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_KEY}&append_to_response=credits&language=es`).then(r=>r.json());
    const dir=data.credits?.crew?.find(p=>p.job==='Director')?.name||'';
    if(dir)document.getElementById('f-director').value=dir;
    if(data.production_countries?.[0]?.name)document.getElementById('f-country').value=data.production_countries[0].name;
  }catch(e){}
}
async function saveFilm(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){showToast('El título es obligatorio');return;}
  const filmData={title,year:parseInt(document.getElementById('f-year').value)||null,director:document.getElementById('f-director').value.trim()||null,country:document.getElementById('f-country').value.trim()||null,poster:document.getElementById('f-poster').value.trim()||null,rating:selectedRating,rewatchCount:parseInt(document.getElementById('f-rewatch').value)||1,comment:document.getElementById('f-comment').value.trim()||null,addedAt:new Date().toISOString()};
  try{
    const saved=await saveFilmToDB(filmData);
    if(editingFilmId){const idx=FILMS.findIndex(f=>f._dbId===editingFilmId);if(idx>=0)FILMS[idx]=saved;else FILMS.unshift(saved);}
    else FILMS.unshift(saved);
    closeForm();renderFilms();populateFilters();
    showToast(editingFilmId?'✓ Película actualizada':'✓ Película agregada');
  }catch(e){showToast('Error: '+e.message);}
}

// ── DETAIL ─────────────────────────────────────────────────────────────────────
function openDetail(dbId){
  const f=FILMS.find(f=>String(f._dbId)===String(dbId));if(!f)return;
  const poster=f.poster?`<img src="https://image.tmdb.org/t/p/w342${f.poster}" style="width:100%;display:block;" onerror="this.style.display='none'">` :'';
  document.getElementById('detail-content').innerHTML=`<button class="mclose" onclick="closeDetail()">×</button>${poster}<div class="mpads"><div style="font-family:'Fraunces',serif;font-size:22px;margin-bottom:4px;">${esc(f.title||'')}</div><div style="font-size:12px;color:var(--text3);margin-bottom:12px;">${f.director||''}${f.year?' · '+f.year:''}${f.country?' · '+f.country:''}</div>${f.rating!=null?`<div style="font-size:28px;font-family:'Fraunces',serif;color:var(--gold2);margin-bottom:12px;">${f.rating}<span style="font-size:14px;color:var(--text3)">/10</span></div>`:''}`
  +`${f.rewatchCount>1?`<div style="font-size:12px;color:var(--purple);margin-bottom:8px;">Visto ${f.rewatchCount} veces</div>`:''}${f.comment?`<div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px;">${esc(f.comment)}</div>`:''}<div style="display:flex;gap:8px;margin-top:8px;"><button onclick="closeDetail();openForm('${f._dbId}')" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px;font-size:12px;color:var(--text2);">✏ Editar</button><button onclick="confirmDelete('${f._dbId}')" style="background:none;border:1px solid var(--red);border-radius:7px;padding:9px 14px;font-size:12px;color:var(--red);">✕</button></div></div>`;
  document.getElementById('ov-detail').classList.add('on');
}
function closeDetail(){document.getElementById('ov-detail').classList.remove('on');}
async function confirmDelete(dbId){
  if(!confirm('¿Eliminar esta película?'))return;
  try{await deleteFilmFromDB(dbId);FILMS=FILMS.filter(f=>String(f._dbId)!==String(dbId));closeDetail();renderFilms();populateFilters();showToast('Película eliminada');}
  catch(e){showToast('Error: '+e.message);}
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────────
function switchView(view,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('view-'+view).classList.add('on');
  if(btn)btn.classList.add('on');

async function loadDirPhoto(name,elId,directEl){

// ── TOP 100 ────────────────────────────────────────────────────────────────────
function buildTop100Dirs() {
  const dm={};
  FILMS.forEach(f=>{
    if(!f.director||f.director.includes(','))return;
    if(!dm[f.director])dm[f.director]={n:0,sum:0,psum:0,pn:0};
    dm[f.director].n++;
    if(f.rating!=null)dm[f.director].sum+=f.rating;
    if(f.subscores?.personal!=null){dm[f.director].psum+=f.subscores.personal;dm[f.director].pn++;}
  });
  return Object.entries(dm).map(([name,v])=>{
    const rawAvg=v.n>0?v.sum/v.n:0;
    const pf=v.n<4?(0.75+v.n*0.05):1;
    const pAvg=v.pn?v.psum/v.pn:null;
    const pScore=pAvg!=null?pAvg*pf:null;
    return{name,n:v.n,avg:rawAvg,score:rawAvg*pf,pavg:pAvg,pscore:pScore,penalty:v.n<4};
  });
}

async function searchFilmog() {
  const name=document.getElementById('filmog-input').value.trim();
  if(!name){showToast('Escribí el nombre del director');return;}
  const res=document.getElementById('filmog-results');
  res.innerHTML='<div style="font-size:13px;color:var(--text3);padding:10px 0">Buscando en TMDB...</div>';
  try {
    const pData=await fetch(`https://api.themoviedb.org/3/search/person?api_key=${TMDB_KEY}&query=${encodeURIComponent(name)}`).then(r=>r.json());
    if(!pData.results?.length){res.innerHTML='<div style="font-size:13px;color:var(--text3);padding:10px 0">Director no encontrado.</div>';return;}
    const person=pData.results[0];
    // Fetch credits with Spanish language for title matching
    const [credData, credDataEs] = await Promise.all([
      fetch(`https://api.themoviedb.org/3/person/${person.id}/movie_credits?api_key=${TMDB_KEY}`).then(r=>r.json()),
      fetch(`https://api.themoviedb.org/3/person/${person.id}/movie_credits?api_key=${TMDB_KEY}&language=es`).then(r=>r.json()),
    ]);
    const directed=(credData.crew||[]).filter(m=>m.job==='Director'&&m.release_date).sort((a,b)=>b.release_date.localeCompare(a.release_date));
    // Build a map of tmdb id → Spanish title
    const esTitleMap={};
    (credDataEs.crew||[]).forEach(m=>{ if(m.id) esTitleMap[m.id]=m.title; });

    // Build seen set: all title variants from user's library
    const seenTitles=new Set(FILMS.map(f=>f.title.toLowerCase().trim()));

    // Match: check original title, Spanish title, and also partial match
    const isFilmSeen = (m) => {
      const origLow = (m.title||'').toLowerCase().trim();
      const esLow = (esTitleMap[m.id]||'').toLowerCase().trim();
      const origTitleLow = (m.original_title||'').toLowerCase().trim();
      return seenTitles.has(origLow) || seenTitles.has(esLow) || seenTitles.has(origTitleLow);
    };

    const getMyFilm = (m) => {
      const origLow = (m.title||'').toLowerCase().trim();
      const esLow = (esTitleMap[m.id]||'').toLowerCase().trim();
      const origTitleLow = (m.original_title||'').toLowerCase().trim();
      return FILMS.find(f => {
        const fl = f.title.toLowerCase().trim();
        return fl===origLow || fl===esLow || fl===origTitleLow;
      });
    };

    const seen=directed.filter(m=>isFilmSeen(m));
    const unseen=directed.filter(m=>!isFilmSeen(m));
    res.innerHTML=`
      <div class="filmog-dir-header">
        <div>
          <div class="filmog-dir-name">${esc(person.name)}</div>
          <div class="filmog-dir-stats">${directed.length} películas · ${seen.length} vistas · ${unseen.length} pendientes</div>
        </div>
      </div>
      ${seen.length?`<div class="filmog-section-title">✅ Vistas (${seen.length})</div>
      <div class="filmog-grid">${seen.map(m=>{
        const myFilm=getMyFilm(m);
        const displayTitle=esTitleMap[m.id]||m.title;
        const poster=m.poster_path?`https://image.tmdb.org/t/p/w185${m.poster_path}`:'';
        return`<div class="filmog-card seen">${poster?`<img src="${poster}" loading="lazy">`:`<div class="filmog-card-noimg">${esc(m.title.substring(0,20))}</div>`}${myFilm?.rating!=null?`<div class="filmog-rating-badge">${fmtR(myFilm.rating)}</div>`:''}<div class="filmog-seen-badge">Vista</div><div class="filmog-card-info"><div class="filmog-card-title">${esc(displayTitle)}</div><div class="filmog-card-year">${m.release_date?.split('-')[0]||'?'}</div></div></div>`;
      }).join('')}</div>`:''}
      ${unseen.length?`<div class="filmog-section-title">🎬 Pendientes (${unseen.length})</div>
      <div class="filmog-grid">${unseen.map(m=>{
        const displayTitle=esTitleMap[m.id]||m.title;
        const poster=m.poster_path?`https://image.tmdb.org/t/p/w185${m.poster_path}`:'';
        const yr=m.release_date?.split('-')[0]||'?';
        return`<div class="filmog-card">${poster?`<img src="${poster}" loading="lazy">`:`<div class="filmog-card-noimg">${esc(m.title.substring(0,20))}</div>`}<div class="filmog-card-info"><div class="filmog-card-title">${esc(displayTitle)}</div><div class="filmog-card-year">${yr}</div></div><button class="filmog-add-btn" onclick="preloadForm('${esc(displayTitle).replace(/'/g,"\\'")}','${esc(person.name).replace(/'/g,"\\'")}','${poster.replace(/'/g,"\\'")}','${yr}')">+ Agregar</button></div>`;
      }).join('')}</div>`:''}`;
  } catch(e){res.innerHTML=`<div style="font-size:13px;color:var(--text3);padding:10px 0">Error. Revisá tu API key.</div>`;}
}

    results.querySelectorAll('[class*="add-overlay"]').forEach(overlay => {
      const card = overlay.parentElement.parentElement;
      card.addEventListener('mouseenter', () => overlay.style.opacity = '1');
      card.addEventListener('mouseleave', () => overlay.style.opacity = '0');
    });

  } catch(e) {
    results.innerHTML = `<div style="font-size:12px;color:var(--text3);padding:12px 0;">Error buscando: ${e.message}</div>`;
  }
}
async function prefillFromTMDB(tmdbId, title, year, posterPath) {
  // Open the add form pre-filled with this movie's data
  openForm(null);
  // Wait for form to open then fill
  await new Promise(r => setTimeout(r, 100));
  const titleInput = document.getElementById('f-title');
  const yearInput = document.getElementById('f-year');
  if(titleInput) titleInput.value = title;
  if(yearInput) yearInput.value = year || '';

  // Fetch full details from TMDB to get director
  try {
    const data = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}&append_to_response=credits&language=es`).then(r=>r.json());
    const director = data.credits?.crew?.find(p=>p.job==='Director')?.name || '';
    const dirInput = document.getElementById('f-director');
    if(dirInput && director) dirInput.value = director;

    // Set poster
    if(posterPath) {
      const sel = document.getElementById('f-poster-sel');
      if(sel) {
        // Find or create option for this poster
        const val = posterPath;
        let opt = [...sel.options].find(o=>o.value===val);
        if(!opt) {
          opt = new Option(`Poster TMDB`, val);
          sel.add(opt);
        }
        sel.value = val;
        const prev = document.getElementById('poster-preview');
        if(prev) { prev.src = `https://image.tmdb.org/t/p/w185${val}`; prev.style.display='block'; }
      }
    }
    showToast(`✓ "${title}" precargado — completá los datos y guardá`);
  } catch(e) {
    showToast(`"${title}" precargado`);
  }
}
function preloadForm(title,director,poster,year) {
  openForm(null);
  setTimeout(()=>{
    document.getElementById('f-title').value=title;
    document.getElementById('f-director').value=director;
    document.getElementById('f-year').value=year;
    if(poster){document.getElementById('f-poster').value=poster;document.getElementById('f-poster-manual').value=poster;applyManualPoster();}
  },100);
}

function renderFestivals(){
  const el=document.getElementById('festivals-body');
  if(!el)return;
  const now=new Date();

  const fests=FESTIVALS_DATA.map(f=>{
    const start=new Date(f.startDate);
    const end=new Date(f.endDate);
    let status=now>=start&&now<=end?'live':now<start?'upcoming':'past';
    const diffDays=Math.ceil((start-now)/(1000*60*60*24));
    return {...f,status,diffDays};
  }).sort((a,b)=>{
    const order={live:0,upcoming:1,past:2};
    if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
    return new Date(a.startDate)-new Date(b.startDate);
  });

  el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;">${fests.map(f=>{
    const badgeLabel=f.status==='live'?'🔴 En curso':f.status==='upcoming'?'Próximo':'Finalizado';
    const countdown=f.status==='upcoming'&&f.diffDays>0
      ?`<div class="fest-countdown">Comienza en <strong>${f.diffDays} día${f.diffDays!==1?'s':''}</strong></div>`:'';

    const winnersHtml=f.winners.length?`
      <div class="fest-section-label" style="margin-top:2px;">🏆 Ganadores</div>
      ${f.winners.map(w=>`<div class="fest-winner-card">
        <div class="fest-winner-prize">${esc(w.prize)}</div>
        <div class="fest-winner-film">${esc(w.title)}</div>
        <div class="fest-winner-dir">${esc(w.dir)}</div>
      </div>`).join('')}`:'';

    const compHtml=f.competition.length?`
      <div class="fest-section-label" style="margin-top:${f.winners.length?8:2}px;">En Competición</div>
      ${f.competition.slice(0,5).map(c=>`<div class="fest-film-item">
        <div class="fest-film-title">${esc(c.title)}</div>
        <div class="fest-film-dir">${esc(c.dir)}</div>
      </div>`).join('')}
      ${f.competition.length>5?`<div style="font-size:10px;color:var(--text3);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);">+${f.competition.length-5} títulos más en competición</div>`:''}`:'';

    const noteHtml=f.note?`<div style="font-size:11px;color:var(--text3);margin-top:10px;font-style:italic;line-height:1.6;padding-top:10px;border-top:1px solid var(--border);">${esc(f.note)}</div>`:'';

    return `<div class="fest-card" style="cursor:pointer;" onclick="window.open('${f.url}','_blank')" title="Ir al sitio oficial">
      <div class="fest-card-top">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div class="fest-badge ${f.status}">${badgeLabel}</div>
          <div style="font-size:9.5px;color:var(--text3);opacity:.6;">↗ sitio oficial</div>
        </div>
        <div class="fest-card-name">${esc(f.name)}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:6px;">${esc(f.edition)}</div>
        <div class="fest-card-dates">${esc(f.dates)}</div>
        <div class="fest-card-location">📍 ${esc(f.location)}</div>
        <div class="fest-card-award">🏆 ${esc(f.award)}</div>
        ${f.juryPresident&&!['Por anunciar','Por confirmar','No competitivo'].includes(f.juryPresident)?`<div style="font-size:11px;color:var(--text2);margin-top:5px;">Jurado: <strong>${esc(f.juryPresident)}</strong></div>`:''}
        ${countdown}
      </div>
      <div class="fest-card-body">
        ${winnersHtml}
        ${compHtml}
        ${noteHtml}
      </div>
    </div>`;
  }).join('')}</div>`;
}
